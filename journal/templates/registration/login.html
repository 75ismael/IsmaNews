{% extends "journal/base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 40px; border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2 style="text-align: center; font-family: 'Playfair Display'; margin-bottom: 25px;">Connexion</h2>
    <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label for="id_username" style="font-size: 0.9rem; font-weight: bold;">Nom d'utilisateur</label>
            <input type="text" name="username" id="id_username" required style="padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; background: transparent; color: var(--text-color);">
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label for="id_password" style="font-size: 0.9rem; font-weight: bold;">Mot de passe</label>
            <input type="password" name="password" id="id_password" required style="padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; background: transparent; color: var(--text-color);">
        </div>
        <button type="submit" style="margin-top: 10px; background-color: var(--monde-red); color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Se Connecter</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
        Pas encore de compte ? <a href="{% url 'signup' %}" style="color: var(--monde-red); font-weight: bold; text-decoration: none;">S'inscrire</a>
    </p>
</div>
{% endblock %}
