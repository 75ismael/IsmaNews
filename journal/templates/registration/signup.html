{% extends "journal/base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 40px; border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2 style="text-align: center; font-family: 'Playfair Display'; margin-bottom: 25px;">Créer un Compte</h2>
    <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem;">
            {{ form.as_p }}
        </div>
        <button type="submit" style="margin-top: 10px; background-color: var(--monde-red); color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">S'inscrire</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
        Déjà inscrit ? <a href="{% url 'login' %}" style="color: var(--monde-red); font-weight: bold; text-decoration: none;">Se connecter</a>
    </p>
</div>

<style>
/* Petits réglages pour le formulaire généré par Django */
form p {
    margin: 5px 0;
}
form input {
    width: 100%;
    box-sizing: border-box;
    padding: 8px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background: transparent;
    color: var(--text-color);
}
.helptext {
    font-size: 0.8rem;
    opacity: 0.7;
    display: block;
    margin-top: 2px;
}
</style>
{% endblock %}
